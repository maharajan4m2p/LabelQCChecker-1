<!DOCTYPE html>
<html>

<head>

<title>
Label QC Checker
</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

h1{
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
}

button{
width:100%;
padding:15px;
background:#007bff;
color:white;
border:none;
font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>
Label QC Checker
</h1>

<form
action="/compare"
method="POST"
enctype="multipart/form-data"
>

<label>

Approval File

</label>

<input
type="file"
name="approval"
required
>

<label>

Sample Files

</label>

<input
type="file"
name="samples"
multiple
required
>

<button type="submit">

Compare Files

</button>

</form>

</div>

</body>

</html>

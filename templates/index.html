<!DOCTYPE html>
<html>

<head>

    <title>Label QC Checker Pro</title>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3 class="mb-0">

                Label QC Checker Pro

            </h3>

        </div>

        <div class="card-body">

            <form

                action="/compare"

                method="POST"

                enctype="multipart/form-data"

            >

                <div class="mb-3">

                    <label class="form-label">

                        Approval Label

                    </label>

                    <input

                        class="form-control"

                        type="file"

                        name="approval"

                        required

                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Sample Label

                    </label>

                    <input

                        class="form-control"

                        type="file"

                        name="sample"

                        multiple
                        required

                    >

                </div>

                <button

                    class="btn btn-success"

                    type="submit"

                >

                    Compare Labels

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>

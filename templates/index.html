<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Label QC Checker</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2563eb;
}

.section{
    margin-top:25px;
}

input[type=file]{
    width:100%;
    padding:10px;
}

button{
    width:100%;
    margin-top:30px;
    padding:15px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.loader{
    display:none;
    text-align:center;
    margin-top:20px;
}

</style>

<script>
function showLoader(){
    document.getElementById("loader").style.display="block";
}
</script>

</head>

<body>

<div class="container">

<h1>🏷️ Label QC Checker</h1>

<form
action="/compare"
method="POST"
enctype="multipart/form-data"
onsubmit="showLoader()"
>

<div class="section">
<h3>Approval Label</h3>
<input type="file"
       name="approval_files"
       required>
</div>

<div class="section">
<h3>Sample Labels</h3>
<input type="file"
       name="sample_files"
       multiple
       required>
</div>

<button type="submit">
🔍 Start Comparison
</button>

<div id="loader" class="loader">
Processing OCR & Comparing Labels...
</div>

</form>

</div>

</body>
</html>
